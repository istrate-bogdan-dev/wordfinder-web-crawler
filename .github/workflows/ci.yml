name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Tests and image build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Audit backend dependencies
        run: |
          python -m pip install pip-audit
          python -m pip_audit -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m unittest test_crawler test_access_control

      - name: Check backend syntax
        run: python -m py_compile backend/main.py backend/crawler.py backend/test_crawler.py backend/test_access_control.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run frontend tests
        run: |
          node frontend/graph-utils.test.js
          node frontend/number-controls.test.js
          node frontend/style.test.js
          node frontend/app-order.test.js
          node frontend/app-state.test.js
          node frontend/favicon.test.js
          node frontend/index.test.js
          node frontend/terms.test.js
          node --check frontend/app.js

      - name: Run infrastructure template checks
        run: node infra/aws/wordfinder-runtime/user-data.test.js

      - name: Build Docker image
        run: docker build -t wordfinder-web-crawler:ci .
