name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: istrate-bogdan-dev/wordfinder-web-crawler

jobs:
  publish-image:
    name: Build and publish GHCR image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,format=short,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy through SSM
    runs-on: ubuntu-latest
    needs: publish-image
    if: ${{ vars.AWS_ROLE_TO_ASSUME != '' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-central-1

      - name: Deploy on EC2 through SSM
        shell: bash
        run: |
          set -euo pipefail

          INSTANCE_ID="$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=wordfinder-prod-ec2" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId | [0]' \
            --output text)"

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "No running WordFinder EC2 instance found."
            exit 1
          fi

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy WordFinder ${GITHUB_SHA}" \
            --parameters 'commands=["cd /opt/wordfinder","docker compose pull","docker compose up -d","docker image prune -f","docker compose ps","for i in $(seq 1 30); do curl -fsS http://127.0.0.1/health && exit 0; sleep 2; done; docker compose ps; docker compose logs --tail=80; exit 1"]' \
            --query 'Command.CommandId' \
            --output text)"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json
